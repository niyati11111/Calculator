<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="calculator">
       <div class="brand-header">
          <span class="brand-name">CASIO</span>
          <span class="model-tag">FX-2077</span>
        </div>
        <div class="lcd-screen">

        </div>
        <div class="buttongrid">
        <button class="btn" data-action="mc" title="Memory Clear">
            MC
        </button>
        <button class="btn" data-action="mr" title="Memory Recall">
            MR
        </button>
        <button class="btn" data-action="mplus" title="Memory Add">
            M+
        </button>
        <button class="btn" data-action="mminus" title="Memory Subtract">
            M−
        </button>
        <button class="btn" data-action="percent" title="">
            %
        </button>
        <button class="btn" data-action="square" title="">
           x^2 
        </button>
        <button class="btnclear" data-action="all Clear" title="">
            AC
        </button>
        <button class="btn" data-action="7" title="">
            7
        </button>
        <button class="btn" data-action="8" title="">
            8
        </button>
        <button class="btn" data-action="9" title="">
            9
        </button>
        <button class="btnop" data-action="/" title="">
            /
        </button>
        <button class="btn" data-action="4" title="">
            4
        </button>
        <button class="btn" data-action="5" title="">
            5
        </button>
        <button class="btn" data-action="6" title="">
            6
        </button>
        <button class="btnop" data-action="*" title="">
            x
        </button>
        <button class="btn" data-action="1" title="">
            1
        </button>
        <button class="btn" data-action="2" title="">
            2
        </button>
        <button class="btn" data-action="3" title="">
            3
        </button>
        <button class="btnop" data-action="-" title="">
            -
        </button>
        <button class="btn" data-action="0" title="">
           0 
        </button>
        <button class="btn" data-action="." title="">
            .
        </button>
        <button class="btnop" data-action="+" title="">
            +
        </button>
        <button class="btneq" data-action="=" title="">
           = 
        </button>
        </div>
      </div>
      <script src="script.js"></script>
</body>
</html>
