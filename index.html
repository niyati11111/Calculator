<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="calculator">
       <div class="brand-header">
          <span class="brand-name">CASIO</span>
          <span class="model-tag">FX-2077</span>
        </div>
        <div class="screen-housing">
        <div class="screen-inner">
          <div class="expression-display" id="expression">
            
          </div>
          <div class="main-display" id="display">

          </div>
        </div>
      </div>
        <div class="buttongrid">
        <button class="btn" data-action="mc" title="Memory Clear">
            MC
        </button>
        <button class="btn" data-action="mr" title="Memory Recall">
            MR
        </button>
        <button class="btn" data-action="mplus" title="Memory Add">
            M+
        </button>
        <button class="btn" data-action="mminus" title="Memory Subtract">
            M−
        </button>
        <button class="btn" data-action="percent">
            %
        </button>
        <button class="btn" data-action="sqrt" >
            ^1/2
        </button>
        <button class="btn" data-action="square" >
           x^2 
        </button>
        <button class="btnclear" data-action="all Clear" >
            AC
        </button>
        <button class="btn" data-action="7" >
            7
        </button>
        <button class="btn" data-action="8">
            8
        </button>
        <button class="btn" data-action="9" >
            9
        </button>
        <button class="btnop" data-action="/">
            /
        </button>
        <button class="btn" data-action="4" >
            4
        </button>
        <button class="btn" data-action="5" >
            5
        </button>
        <button class="btn" data-action="6" >
            6
        </button>
        <button class="btnop" data-action="*">
            x
        </button>
        <button class="btn" data-action="1" >
            1
        </button>
        <button class="btn" data-action="2" >
            2
        </button>
        <button class="btn" data-action="3" >
            3
        </button>
        <button class="btnop" data-action="-" >
            -
        </button>
        <button class="btn" data-action="0" >
           0 
        </button>
        <button class="btn" data-action="." >
            .
        </button>
        <button class="btnop" data-action="+">
            +
        </button>
        <button class="btneq" data-action="=">
           = 
        </button>
        </div>
      </div>
      <script src="script.js"></script>
</body>
</html>
